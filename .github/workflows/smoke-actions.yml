name: Actions smoke test

# Minimal workflow: if this appears and runs, Actions is enabled for the repo.
on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm Actions runs
        run: |
          echo "OK: GitHub Actions ran on $GITHUB_REF @ $GITHUB_SHA"
