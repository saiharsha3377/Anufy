name: Build debug APK

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  debug_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # AGP configures the :app module during *any* Gradle invocation (even `gradle wrapper`).
      # Install the Android SDK *before* running Gradle against this repo.
      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Install compile SDK + build tools
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" >/dev/null

      - name: Point Gradle at the Android SDK
        shell: bash
        run: |
          set -euo pipefail
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [[ -z "${SDK}" ]]; then
            echo "ANDROID_SDK_ROOT / ANDROID_HOME is empty" >&2
            exit 1
          fi
          echo "sdk.dir=${SDK}" > local.properties

      # This repo only had gradle-wrapper.properties; bootstrap full wrapper (gradlew + jar).
      - name: Bootstrap Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          GRADLE_VERSION=8.9
          curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o "/tmp/gradle.zip"
          unzip -qo "/tmp/gradle.zip" -d "/tmp"
          "/tmp/gradle-${GRADLE_VERSION}/bin/gradle" wrapper \
            --gradle-version "${GRADLE_VERSION}" \
            --distribution-type bin
          chmod +x gradlew

      - name: Setup Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aurora-music-debug
          path: app/build/outputs/apk/debug/app-debug.apk
