name: Build debug APK

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  debug_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses (if prompted)
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Install compile SDK + build tools
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" >/dev/null

      - name: Point Gradle at the Android SDK
        run: |
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          echo "sdk.dir=${SDK}" > local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aurora-music-debug
          path: app/build/outputs/apk/debug/app-debug.apk
