name: Build debug APK

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  debug_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Platform 35 for AndroidX; build-tools 34 is reliably installable everywhere.
      - name: Android SDK
        uses: android-actions/setup-android@v4.0.1
        with:
          packages: "tools platform-tools platforms;android-35 build-tools;34.0.0"

      - name: Point Gradle at the Android SDK
        shell: bash
        run: |
          set -euo pipefail
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [[ -z "${SDK}" ]]; then
            echo "ANDROID_SDK_ROOT / ANDROID_HOME is empty" >&2
            exit 1
          fi
          echo "sdk.dir=${SDK}" > local.properties

      - name: Assemble debug APK
        shell: bash
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee assemble.log

      - name: Upload CI diagnostics (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          if-no-files-found: ignore
          path: |
            assemble.log
            app/build/reports
            app/build/outputs

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aurora-music-debug
          path: app/build/outputs/apk/debug/app-debug.apk
