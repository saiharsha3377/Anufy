name: Build debug APK

# Only `main` pushes + manual runs = faster CI (no duplicate PR + push jobs).
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug_apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK
        uses: android-actions/setup-android@v4.0.1
        with:
          packages: "tools platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Point Gradle at the Android SDK
        shell: bash
        run: |
          set -euo pipefail
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          echo "sdk.dir=${SDK}" > local.properties

      - name: Setup Gradle (dependency + wrapper cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --stacktrace --build-cache 2>&1 | tee assemble.log

      - name: Report failure snippet
        if: failure()
        shell: bash
        run: |
          {
            echo "## Gradle (tail)"
            echo '```text'
            tail -n 80 assemble.log 2>/dev/null || true
            echo '```'
            LINE="$(grep -m1 "e: file://" assemble.log || true)"
            if [[ -z "${LINE}" ]]; then
              LINE="$(grep -m1 -E "> Task :app:.*FAILED" assemble.log || true)"
            fi
            if [[ -n "${LINE}" ]]; then
              echo "::error::${LINE:0:900}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          if-no-files-found: ignore
          path: |
            assemble.log
            app/build/reports

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aurora-music-debug
          path: app/build/outputs/apk/debug/app-debug.apk
