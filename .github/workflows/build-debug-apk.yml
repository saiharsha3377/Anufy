name: Build debug APK

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  debug_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # AGP configures :app during Gradle configuration — SDK must exist first.
      - name: Android SDK
        uses: android-actions/setup-android@v3

      # setup-android already accepts licenses by default; re-running `sdkmanager --licenses`
      # in CI often exits non-zero and fails the whole job.
      - name: Install compile SDK + build tools
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" >/dev/null

      - name: Point Gradle at the Android SDK
        shell: bash
        run: |
          set -euo pipefail
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [[ -z "${SDK}" ]]; then
            echo "ANDROID_SDK_ROOT / ANDROID_HOME is empty" >&2
            exit 1
          fi
          echo "sdk.dir=${SDK}" > local.properties

      - name: Setup Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: chmod +x ./gradlew && ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aurora-music-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Gradle reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-reports
          if-no-files-found: ignore
          path: |
            app/build/reports
            app/build/outputs
