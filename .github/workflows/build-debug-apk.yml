name: Build debug APK

# Only `main` pushes + manual runs = faster CI (no duplicate PR + push jobs).
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug_apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK
        uses: android-actions/setup-android@v4.0.1
        with:
          packages: "tools platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Point Gradle at the Android SDK
        shell: bash
        run: |
          set -euo pipefail
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          echo "sdk.dir=${SDK}" > local.properties

      - name: Setup Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        shell: bash
        env:
          GRADLE_OPTS: "-Dorg.gradle.workers.max=2"
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          set +e
          ./gradlew :app:assembleDebug --stacktrace --build-cache 2>&1 | tee assemble.log
          GRADLE_EXIT=${PIPESTATUS[0]}
          set -e
          if [[ "${GRADLE_EXIT}" -ne 0 ]]; then
            echo "::group::Gradle failure excerpt"
            grep -E "FAILED|What went wrong|> Task :app:|e: file://|error:|Unresolved" assemble.log | tail -n 80 || true
            tail -n 60 assemble.log || true
            echo "::endgroup::"
            exit "${GRADLE_EXIT}"
          fi

      - name: Report failure snippet
        if: failure()
        shell: bash
        run: |
          {
            echo "## Gradle (errors / tail)"
            echo '```text'
            grep -E "FAILED|What went wrong|> Task :app:|e: file://|error:|Unresolved" assemble.log 2>/dev/null | tail -n 60 || true
            echo "--- tail ---"
            tail -n 40 assemble.log 2>/dev/null || true
            echo '```'
            LINE="$(grep -m1 "e: file://" assemble.log || true)"
            if [[ -z "${LINE}" ]]; then
              LINE="$(grep -m1 -E "> Task :app:.*FAILED|What went wrong:" assemble.log || true)"
            fi
            if [[ -n "${LINE}" ]]; then
              echo "::error::${LINE:0:900}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          if-no-files-found: ignore
          path: |
            assemble.log
            app/build/reports

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aurora-music-debug
          path: app/build/outputs/apk/debug/app-debug.apk
